name: MAGC_DTI
channels:
  - conda-forge
  - dglteam/label/cu121
  - defaults

dependencies:
  - python=3.9.23
  - pip=25.2

  # Core scientific stack
  - numpy=1.23.5
  - pandas=2.0.3
  - scipy=1.12.0
  - scikit-learn=1.6.1
  - matplotlib-base=3.9.4
  - seaborn=0.13.2
  - networkx=3.2.1
  - joblib=1.5.1
  - tqdm=4.67.1
  - psutil=7.0.0
  - sqlalchemy=2.0.42

  # Chemistry / graph / bio
  - rdkit=2024.03.5
  - dgl=2.0.0.cu121
  - dgllife=0.3.2
  - biopython=1.85
  - pycairo=1.28.0
  - reportlab=4.4.1

  - pip:
      # PyTorch CUDA 12.1 wheels
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.2.2+cu121
      - torchvision==0.17.2+cu121
      - torchaudio==2.2.2+cu121
      - triton==2.2.0
      - torchdata==0.8.0
      - torchmetrics==1.8.2
      - pytorch-lightning==2.6.0
      - lightning-utilities==0.15.2

      # Transformer / protein / molecular models
      - transformers==4.57.1
      - tokenizers==0.22.1
      - huggingface-hub==0.35.3
      - safetensors==0.6.2
      - sentencepiece==0.2.1
      - fair-esm==2.0.0
      - openfold==1.0.1
      - einops==0.8.1
      - ml-collections==0.1.1
      - omegaconf==2.3.0
      - antlr4-python3-runtime==4.9.3

      # File / data utilities
      - h5py==3.14.0
      - pyyaml==6.0.2
      - regex==2025.9.18
      - prettytable==3.16.0
      - msgpack==1.1.2
      - filelock==3.13.1
      - requests==2.32.4
      - pillow==11.0.0

      # Bio / structure / visualization
      - py3dmol==2.5.3
      - ihm==2.8
      - modelcif==1.6

      # Optimization / experiment utilities
      - hyperopt==0.2.7
      - absl-py==2.3.1
      - yacs==0.1.8
      - ninja==1.13.0
      - dllogger==1.1.0
      - contextlib2==21.6.0
